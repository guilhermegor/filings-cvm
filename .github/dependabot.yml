# Dependabot **version** updates (routine bumps) — distinct from Dependabot **security** updates
# (CVE-triggered auto-PRs), which are toggled via the API in bin/enable_security.sh.
#
# NO `labels:` KEY HERE, deliberately. bin/pr_gate.py labels every PR from its changed PATHS
# (`risk:*` / `size:*` / `gate:*`) and keys auto-merge off that classification, not off any label
# Dependabot adds. A `labels: ["deps"]` would be a second taxonomy nothing reads — and Dependabot
# refuses to apply a label that does not exist in the repo, so it posted an error comment on every
# PR it opened (#79, #80) until these keys were removed. Do not re-add them.
#
# WHY THIS MATTERS HERE: poetry.lock is committed and CI installs FROM it (poetry install --no-root)
# and refuses to re-lock (see .github/workflows/tests.yaml). So CI tests the frozen locked versions,
# while a consumer running `pip install filings-cvm` gets the latest the loose `>=` ranges allow.
# Those drift apart. This file keeps the lock fresh so CI tests ~what consumers actually install —
# WITHOUT narrowing the library's ranges (versioning-strategy: lockfile-only leaves pyproject alone,
# which also keeps it in sync with the lock, so the CI lock-sync guard is never tripped).
version: 2
updates:
  # CI action versions — the low-noise win: keeps workflows off deprecated runtimes (this repo hit
  # a Node-20 deprecation on download-artifact). Grouped so all action bumps arrive as one PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"

  # Python deps (Poetry). lockfile-only: bump poetry.lock, never rewrite the `>=` ranges — a library
  # must not narrow its ranges for consumers. Minor/patch are grouped into one PR; a MAJOR arrives on
  # its own PR so it gets scrutiny (majors are where breakage lives). CI runs the full gate on each
  # PR, so a bump that breaks lint/tests reddens the dependabot PR — never main.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: "lockfile-only"
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # We deliberately support pandas 2.x AND 3.x (tested on both) — a major bump is a manual,
      # reviewed decision, not an automated one. Minor/patch pandas still flow through.
      - dependency-name: "pandas"
        update-types:
          - "version-update:semver-major"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
