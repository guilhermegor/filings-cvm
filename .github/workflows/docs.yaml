name: Docs - Build Check

# Build the MkDocs site under `--strict` on every push and PR, as a guard that the docs are
# always publishable — WITHOUT deploying. Deployment is owned by the release workflow, which
# versions the site with mike (https://github.com/jimporter/mike) and publishes each release to
# the `gh-pages` branch (see release-pypi.yaml). Keeping the build green here means a release
# never discovers a broken docs tree at deploy time.
#
# There is deliberately no `pages`/`id-token` permission and no deploy job: this workflow only
# proves the site compiles. GitHub Pages serves from the `gh-pages` branch (set once via
# `make enable_pages`), fed exclusively by mike from the release workflow.
on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          # Full history so `cz changelog` sees the tags when regenerating CHANGELOG.md.
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true
          virtualenvs-create: true

      - name: Install Docs Dependencies
        run: poetry install --with docs

      # Regenerate CHANGELOG.md from the commit/tag history so the Changelog page's
      # `--8<-- "CHANGELOG.md"` include resolves under --strict. Never committed to main; produced
      # fresh here (cz derives sections from git tags).
      - name: Regenerate CHANGELOG.md
        run: poetry run cz changelog

      - name: Build Site (strict)
        run: poetry run mkdocs build --strict
