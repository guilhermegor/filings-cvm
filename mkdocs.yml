site_name: filings-cvm
site_description: Biblioteca Python para os padrões de arquivo XML regulatórios da CVM.
site_url: https://guilhermegor.github.io/filings-cvm/
repo_url: https://github.com/guilhermegor/filings-cvm
docs_dir: docs
nav:
  - Início: index.md
  - Uso: usage.md
  - Envio (→ CVM):
      - Perfil Mensal: submission/perfil_mensal.md
      - Informe Diário: submission/informe_diario.md
  - Leitura (← CVM):
      - Visão geral: ingestion/index.md
      - Informe Diário FIF: ingestion/informe_diario.md
      - CDA FIF: ingestion/cda.md
      - Lâmina carteira FIF: ingestion/lamina_carteira.md
      - Lâmina FIF: ingestion/lamina.md
      - Cadastro de Fundos (CAD/FI): ingestion/cadastro_fi.md
      - Registro RCVM 175: ingestion/registro.md
      - CAD/FI histórico: ingestion/cad_fi_hist.md
      - Informe Mensal FIDC: ingestion/inf_mensal_fidc.md
      - Informe Mensal FII: ingestion/inf_mensal_fii.md
      - DFIN FII: ingestion/dfin_fii.md
      - Informe Trimestral FII: ingestion/inf_trimestral_fii.md
      - Informe Anual FII: ingestion/inf_anual_fii.md
      - Informes periódicos FIP: ingestion/inf_fip.md
  - Referência da API: api.md
  - Perguntas frequentes: faq.md
  - Contribuindo: contributing.md
  - Histórico de versões: changelog.md
theme:
  name: material
  language: pt-BR
  logo: assets/cvm-logo.png
  favicon: assets/cvm-logo.png
  # The `media` queries make the site follow the READER'S OS theme on first visit, instead of always
  # opening light (Material picks the first palette when no `media` is given). The toggle still wins
  # and is remembered in localStorage — the OS preference is only the default.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Alternar para o modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/white-balance-sunny
        name: Alternar para o modo claro
# Version selector, powered by mike (https://github.com/jimporter/mike). Each release publishes
# its own version to the `gh-pages` branch (`mike deploy X.Y latest` in release-pypi.yaml), and this
# provider renders the dropdown that lets a reader switch between them. `latest` is the default
# alias, so the bare site URL always lands on the newest release.
extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  # Enables the `--8<-- "CHANGELOG.md"` include on the Changelog page (single-sources the root file).
  - pymdownx.snippets:
      base_path:
        - .

# Non-published docs: MkDocs builds every .md under docs/, so working
# documents must be excluded here or they ship to readers.
# NOTE: exclude_docs uses .gitignore syntax, which has NO inline comments — a trailing
# "# ..." becomes part of the pattern and silently disables the exclusion. Keep every
# comment on its own line above the pattern.
exclude_docs: |
  # work-to-do backlogs / follow-up notes
  backlog/
  # design specs / working notes, not published
  superpowers/
  # docs/ authoring guidance, not a published page
  CLAUDE.md
  # offline merge-checkpoint log, internal
  checkpoints.md
  # git-ignored scaffolding-lessons record, never published
  blueprintx-lessons.md
  # git-ignored dotfiles-dev toolchain backport queue, never published
  dotfiles-dev-lessons.md
  # git-ignored bedrock-fm architecture record, never published
  bedrock-fm-lessons.md
